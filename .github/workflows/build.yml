name: Build HTTPCustom for BPI-R4

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget curl zstd

    - name: Fetch Latest OpenWrt SDK (MediaTek Filogic)
      run: |
        # Core Logic: ใช้รุ่น Stable 25.12.2
        BASE_URL="https://downloads.openwrt.org/releases/25.12.2/targets/mediatek/filogic"
        
        # Explicit Logic: ค้นหาชื่อไฟล์ที่ครอบคลุมทั้ง .tar.xz (แบบเก่า) และ .tar.zst (แบบใหม่)
        SDK_FILE=$(curl -s "$BASE_URL/sha256sums" | grep "openwrt-sdk" | grep -E "\.tar\.(xz|zst)" | awk '{print $2}' | sed 's/*//g')
        
        if [ -z "$SDK_FILE" ]; then
          echo "Fatal Error: Cannot resolve SDK filename from $BASE_URL"
          exit 1
        fi
        
        echo "Downloading $SDK_FILE..."
        wget "$BASE_URL/$SDK_FILE"
        tar -xf "$SDK_FILE"
        mv openwrt-sdk-*/ openwrt-sdk/

    - name: Prepare Package & Update Feeds
      run: |
        mkdir -p openwrt-sdk/package/luci-app-httpcustom
        # ป้องกันการคัดลอกไฟล์บีบอัดทุกนามสกุลเข้าไปใน SDK
        rsync -av --exclude='.github' --exclude='openwrt-sdk' --exclude='*.tar.*' . openwrt-sdk/package/luci-app-httpcustom/
        
        cd openwrt-sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        make defconfig

    - name: Compile Package
      run: |
        cd openwrt-sdk
        # บังคับ Compile เฉพาะแพ็กเกจของเราเพื่อประหยัดเวลา
        make package/luci-app-httpcustom/compile V=s

    - name: Upload Artifact (.apk)
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-httpcustom-bpi-r4
        path: openwrt-sdk/bin/packages/*/base/luci-app-httpcustom_*.apk
        retention-days: 7
